<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SouqAuto Maroc</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Mercado de coches usados en Marruecos</p>
        <h1>SouqAuto Maroc</h1>
        <p class="hero-copy">
          Descubre cuanto podria valer tu coche y si el modelo cree que ha tenido un
          unico propietario.
        </p>
      </section>

      <section class="panel">
        <form id="car-form" class="form-grid">
          <label>
            Marca
            <select id="brand" name="brand" required></select>
          </label>

          <label>
            Modelo
            <select id="model" name="model" required disabled></select>
          </label>

          <label>
            Antiguedad
            <select id="age" name="age" required></select>
          </label>

          <label>
            Kilometraje
            <input
              id="mileage"
              name="mileage"
              type="number"
              min="0"
              step="1"
              placeholder="Ej. 120000"
              required
            />
          </label>

          <label>
            Potencia fiscal
            <select id="fiscal-power" name="fiscal_power_num" required></select>
          </label>

          <label>
            Numero de puertas
            <select id="doors" name="number_of_doors" required></select>
          </label>

          <label>
            Cambio
            <select id="gearbox" name="gearbox" required></select>
          </label>

          <label>
            Combustible
            <select id="fuel" name="fuel" required></select>
          </label>

          <label class="full-width">
            Estado
            <select id="condition" name="condition" required></select>
          </label>

          <fieldset class="full-width extras-box">
            <legend>Extras del coche</legend>
            <div id="extras-container" class="extras-grid"></div>
          </fieldset>

          <div id="inline-warning" class="inline-warning full-width hidden"></div>

          <div class="actions full-width">
            <button type="submit" class="primary-btn">Calcular estimacion</button>
          </div>
        </form>
      </section>

      <section id="results" class="results hidden">
        <div class="result-card">
          <p class="result-label">Precio estimado</p>
          <h2 id="estimated-price">-</h2>
          <p class="result-foot">Estimacion del Random Forest sobre `Price`</p>
        </div>

        <div class="result-card">
          <p class="result-label">First Owner</p>
          <h2 id="first-owner-label">-</h2>
          <p id="first-owner-probability" class="result-foot">-</p>
        </div>

        <div id="result-warnings" class="notice-stack"></div>

        <div class="actions">
          <button id="download-pdf" class="secondary-btn" type="button">
            Descargar informe PDF
          </button>
        </div>
      </section>
    </main>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
